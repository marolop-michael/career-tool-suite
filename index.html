<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Tool Suite - Responsive Edition</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #fcfdfe;
            --sidebar-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            display: flex;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            flex-direction: row;
        }

        /* Sidebar Navigation - Desktop Default */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            padding: 32px 16px;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .brand {
            padding: 0 12px 32px;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.025em;
            text-transform: uppercase;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: transparent;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            border-radius: var(--radius);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn:hover {
            background-color: #f8fafc;
            color: var(--text-main);
        }

        .nav-btn.active {
            background-color: #eff6ff;
            color: var(--primary);
            font-weight: 600;
        }

        /* Main Content Area */
        .main-content {
            margin-left: 260px; /* Lebar sidebar desktop */
            flex: 1;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .feature-section {
            display: none;
        }

        .feature-section.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title { margin-bottom: 24px; }
        .header-title h1 { font-size: 1.5rem; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
        .header-title p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .card {
            background: #ffffff;
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: var(--text-main); }

        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background-color: #fff;
            color: var(--text-main);
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-primary {
            width: auto;
            background-color: var(--primary);
            color: #fff; border: none; padding: 14px 28px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 14px; 
            transition: background-color 0.2s;
        }

        .btn-primary:hover { background-color: var(--primary-hover); }

        /* Output Styling */
        .output-container { margin-top: 32px; border-top: 1px solid var(--border); padding-top: 24px; }
        .output-container.hidden { display: none; }
        .output-label { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; display: block; text-transform: uppercase; }
        .output-box {
            background-color: #f8fafc; border: 1px solid var(--border); border-radius: 8px;
            padding: 20px; font-family: monospace; font-size: 13px; color: #334155; 
            white-space: pre-wrap; word-break: break-all;
        }

        .btn-secondary { background: #f1f5f9; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 10px; }

        /* Mobile Responsive Adjustments */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 20px 16px;
            }

            .brand { padding: 0 0 16px 4px; font-size: 1.1rem; }

            .nav-menu {
                flex-direction: row;
                overflow-x: auto;
                gap: 4px;
                scrollbar-width: none; /* Hide scrollbar Firefox */
            }
            .nav-menu::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

            .nav-btn {
                white-space: nowrap;
                padding: 10px 14px;
                font-size: 13px;
                justify-content: center;
            }

            .main-content {
                margin-left: 0;
                padding: 24px 16px;
            }

            .grid-inputs {
                grid-template-columns: 1fr; /* Tumpuk input di mobile */
            }

            .header-title h1 { font-size: 1.3rem; }
            .btn-primary { width: 100%; } /* Tombol lebar penuh di mobile */
        }

        #copyBuffer { position: absolute; left: -9999px; opacity: 0; }
        .loader { width: 14px; height: 14px; border: 2px solid #fff; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <textarea id="copyBuffer" aria-hidden="true"></textarea>

    <!-- Navigation Area -->
    <nav class="sidebar">
        <div class="brand">CAREER TOOLS</div>
        <div class="nav-menu">
            <button class="nav-btn active" id="btn-tab-feature1" onclick="switchTab('feature1')">Watermark</button>
            <button class="nav-btn" id="btn-tab-feature2" onclick="switchTab('feature2')">Extractor</button>
        </div>
    </nav>

    <!-- Content Area -->
    <main class="main-content">
        <div class="container">
            
            <!-- FEATURE 1: WATERMARK -->
            <section id="feature1" class="feature-section active">
                <div class="header-title">
                    <h1>Verification Watermark</h1>
                    <p>Hasilkan teks verifikasi khusus agar dokumen lamaran Anda lebih aman.</p>
                </div>
                <div class="card">
                    <div class="form-group">
                        <label>Nama Perusahaan</label>
                        <input type="text" id="companyName" placeholder="Masukkan Nama Perusahaan Tujuan" autocomplete="off">
                    </div>
                    <div class="grid-inputs">
                        <div class="form-group">
                            <label>Hari dari Sekarang (0 = Hari ini)</label>
                            <input type="number" id="daysOffset" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Jumlah Baris Duplikasi</label>
                            <input type="number" id="duplicateCount" placeholder="1">
                        </div>
                    </div>
                    <button class="btn-primary" onclick="generateWatermark()">Generate Watermark</button>
                </div>

                <div id="watermarkResult" class="output-container hidden">
                    <span class="output-label">Teks Tunggal</span>
                    <div class="output-box" id="singleOutput"></div>
                    <button class="btn-secondary" onclick="copyId('singleOutput')">Salin Teks</button>

                    <div style="margin-top: 24px;">
                        <span class="output-label">List Duplikasi</span>
                        <div class="output-box" id="arrayOutput" style="max-height: 200px; overflow-y: auto;"></div>
                        <button class="btn-secondary" onclick="copyId('arrayOutput')">Salin Semua Baris</button>
                    </div>
                </div>
            </section>

            <!-- FEATURE 2: EXTRACTOR -->
            <section id="feature2" class="feature-section">
                <div class="header-title">
                    <h1>Contact Extractor</h1>
                    <p>Cari email, link, atau WhatsApp dari deskripsi lowongan secara otomatis.</p>
                </div>
                <div class="card">
                    <div class="form-group">
                        <label>Tempel Teks Lowongan</label>
                        <textarea id="jobDescription" placeholder="Masukkan detail lowongan di sini..."></textarea>
                    </div>
                    <button class="btn-primary" id="btnExtract" onclick="runExtraction()">Ekstrak Sekarang</button>
                </div>

                <div id="jobResult" class="output-container hidden">
                    <div id="extractorContent"></div>
                    <button class="btn-secondary" onclick="resetExtraction()">Bersihkan</button>
                </div>
            </section>

        </div>
    </main>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.feature-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-tab-' + id).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function generateWatermark() {
            const companyInput = document.getElementById('companyName');
            const company = companyInput.value.trim().toUpperCase();
            if (!company) { showToast("Isi nama perusahaan!"); companyInput.focus(); return; }

            const offset = parseInt(document.getElementById('daysOffset').value) || 0;
            const count = parseInt(document.getElementById('duplicateCount').value) || 1;

            const d = new Date();
            d.setDate(d.getDate() + offset);
            const dateStr = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
            
            const result = `DIUNGGAH UNTUK SELEKSI KERJA ${company} ${dateStr}`;
            
            document.getElementById('singleOutput').textContent = result;
            
            let listHtml = "";
            for(let i=0; i<Math.min(count, 100); i++) {
                listHtml += `<div>${result}</div>`;
            }
            document.getElementById('arrayOutput').innerHTML = listHtml;
            document.getElementById('watermarkResult').classList.remove('hidden');
        }

        function runExtraction() {
            const text = document.getElementById('jobDescription').value.trim();
            if (!text) { showToast("Teks kosong!"); return; }

            const btn = document.getElementById('btnExtract');
            btn.innerHTML = '<span class="loader"></span> Memproses...';
            btn.disabled = true;

            setTimeout(() => {
                const emails = [...new Set(text.match(/\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b/g) || [])];
                const links = [...new Set(text.match(/(https?:\/\/[^\s]+|(?:www\.|bit\.ly|forms\.gle)\/[^\s]+)/gi) || [])];
                const was = [...new Set(text.match(/(?:\+?62|0)8[1-9][0-9]{7,11}/g) || [])];

                const container = document.getElementById('extractorContent');
                container.innerHTML = '';
                
                if (emails.length) renderBlock(container, "EMAIL", emails);
                if (links.length) renderBlock(container, "LINK", links);
                if (was.length) renderBlock(container, "WHATSAPP", was);
                
                if (!emails.length && !links.length && !was.length) {
                    container.innerHTML = '<p style="font-size:13px; color:var(--text-muted)">Tidak ditemukan kontak.</p>';
                }

                document.getElementById('jobResult').classList.remove('hidden');
                btn.innerHTML = 'Ekstrak Sekarang';
                btn.disabled = false;
            }, 600);
        }

        function renderBlock(parent, label, items) {
            const div = document.createElement('div');
            div.style.marginBottom = "20px";
            div.innerHTML = `<b style="font-size:11px; color:var(--primary)">${label}</b>`;
            items.forEach(item => {
                const p = document.createElement('p');
                p.textContent = item;
                p.style.fontSize = "14px";
                p.style.margin = "4px 0";
                div.appendChild(p);
            });
            parent.appendChild(div);
        }

        function resetExtraction() {
            document.getElementById('jobDescription').value = '';
            document.getElementById('jobResult').classList.add('hidden');
        }

        async function copyId(id) {
            const text = document.getElementById(id).innerText;
            try {
                if (navigator.clipboard) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const buf = document.getElementById('copyBuffer');
                    buf.value = text; buf.select(); document.execCommand('copy');
                }
                showToast("Tersalin!");
            } catch (e) { showToast("Gagal menyalin."); }
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = "position:fixed; bottom:20px; right:20px; background:#1e293b; color:#fff; padding:10px 20px; border-radius:8px; font-size:12px; z-index:1000;";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }
    </script>
</body>
</html>
